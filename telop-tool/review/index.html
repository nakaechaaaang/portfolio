<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>テロップ校閲</title>
<style>
  :root { --blue:#1466ff; --bg:#0f1115; --card:#1a1d24; --line:#2a2f3a; --mut:#8a93a3; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif;
         background:var(--bg); color:#e7ebf2; }
  header { position:sticky; top:0; z-index:5; background:#12151c; border-bottom:1px solid var(--line);
           padding:12px 18px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; font-weight:700; }
  header .sp { flex:1; }
  .ctrl { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--mut); }
  .ctrl input[type=number]{ width:64px; background:#0c0e12; color:#e7ebf2; border:1px solid var(--line);
           border-radius:6px; padding:4px 6px; }
  button { font:inherit; cursor:pointer; border:none; border-radius:8px; padding:8px 14px; font-weight:600; }
  .btn-save { background:#2a2f3a; color:#e7ebf2; }
  .btn-done { background:var(--blue); color:#fff; }
  .btn-ghost{ background:transparent; color:var(--mut); border:1px solid var(--line); padding:4px 10px; }
  main { max-width:920px; margin:0 auto; padding:18px; }
  .hint { color:var(--mut); font-size:12px; margin:0 0 14px; line-height:1.7; }
  .row { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px;
         margin-bottom:10px; display:grid; grid-template-columns:64px 1fr auto; gap:12px; align-items:start; }
  .row.deleted { opacity:.4; }
  .row.filler { border-color:#7a5d12; }
  .id { color:var(--mut); font-size:12px; font-variant-numeric:tabular-nums; }
  .time { color:var(--mut); font-size:11px; font-variant-numeric:tabular-nums; margin-top:4px; }
  textarea { width:100%; background:#0c0e12; color:#e7ebf2; border:1px solid var(--line);
             border-radius:8px; padding:8px 10px; font:inherit; resize:vertical; min-height:42px; line-height:1.5; }
  .actions { display:flex; flex-direction:column; gap:6px; align-items:stretch; }
  .tag { font-size:10px; color:#e6b84a; border:1px solid #7a5d12; border-radius:999px; padding:1px 8px; align-self:flex-start; }
  .play { background:#0c0e12; border:1px solid var(--line); color:#cfd6e2; border-radius:8px; padding:6px 10px; font-size:12px; }
  .del { background:transparent; border:1px solid var(--line); color:var(--mut); border-radius:8px; padding:6px 10px; font-size:12px; }
  .saved { color:#6ee787; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1>🖊 テロップ校閲</h1>
  <div class="ctrl">オフセット秒
    <input id="offset" type="number" step="0.05" />
  </div>
  <div class="ctrl">隙間ゼロ化(秒以下)
    <input id="gap" type="number" step="0.1" />
  </div>
  <span class="sp"></span>
  <span id="status" class="saved"></span>
  <button class="btn-save" id="save">保存</button>
  <button class="btn-done" id="done">校閲完了</button>
</header>
<main>
  <p class="hint">
    JSONが真実 / SRTは派生。ここでの編集は校閲JSONに保存され、SRTは後段で生成されます。<br>
    ・テキストを直接修正（句読点はSRT生成時に自動で除去）<br>
    ・<b>不要</b>で字幕ごと削除（フィラー「えー」等は黄色枠の候補。削除は人が判断）<br>
    ・<b>▶</b>でその字幕の音声を再生して、喋り出しと合っているか確認<br>
    最後に「校閲完了」を押すと、reviewed=true で保存され処理が次に進みます。
  </p>
  <div id="list"></div>
</main>
<audio id="audio" src="/media/audio.wav" preload="auto"></audio>

<script>
let doc = null;
const audio = document.getElementById('audio');
const $ = (id) => document.getElementById(id);

async function load() {
  doc = await (await fetch('/api/data')).json();
  $('offset').value = doc.offset_sec ?? 0;
  $('gap').value = doc.max_close_gap_sec ?? 1.0;
  render();
}

function fmt(t){ t=Math.max(0,t||0); const m=Math.floor(t/60); const s=(t%60);
  return `${String(m).padStart(2,'0')}:${s.toFixed(2).padStart(5,'0')}`; }

function render() {
  const list = $('list');
  list.innerHTML = '';
  doc.items.forEach((it, idx) => {
    const row = document.createElement('div');
    row.className = 'row' + (it.deleted?' deleted':'') + (it.filler?' filler':'');
    row.innerHTML = `
      <div>
        <div class="id">#${it.id}</div>
        <div class="time">${fmt(it.start)}<br>${fmt(it.end)}</div>
      </div>
      <div>
        ${it.filler?'<span class="tag">フィラー候補</span>':''}
        <textarea data-i="${idx}">${(it.text||'').replace(/</g,'&lt;')}</textarea>
      </div>
      <div class="actions">
        <button class="play" data-play="${idx}">▶ 再生</button>
        <button class="del" data-del="${idx}">${it.deleted?'戻す':'不要'}</button>
      </div>`;
    list.appendChild(row);
  });

  list.querySelectorAll('textarea').forEach(t =>
    t.addEventListener('input', e => { doc.items[+e.target.dataset.i].text = e.target.value; }));
  list.querySelectorAll('[data-del]').forEach(b =>
    b.addEventListener('click', e => { const i=+e.target.dataset.del;
      doc.items[i].deleted = !doc.items[i].deleted; render(); }));
  list.querySelectorAll('[data-play]').forEach(b =>
    b.addEventListener('click', e => { const it=doc.items[+e.target.dataset.play];
      audio.currentTime = Math.max(0, it.start - 0.15); audio.play();
      const stop = () => { if (audio.currentTime >= it.end + 0.15){ audio.pause();
        audio.removeEventListener('timeupdate', stop);} };
      audio.addEventListener('timeupdate', stop); }));
}

function collect() {
  doc.offset_sec = parseFloat($('offset').value) || 0;
  doc.max_close_gap_sec = parseFloat($('gap').value) || 0;
  return { items: doc.items, offset_sec: doc.offset_sec, max_close_gap_sec: doc.max_close_gap_sec };
}

async function post(url) {
  const r = await fetch(url, {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(collect())});
  return r.ok;
}

$('save').addEventListener('click', async () => {
  if (await post('/api/save')) { $('status').textContent = '保存しました ✓';
    setTimeout(()=>$('status').textContent='', 2000); }
});
$('done').addEventListener('click', async () => {
  if (!confirm('校閲を完了します。SRT生成へ進みます。よろしいですか？')) return;
  if (await post('/api/done')) {
    document.body.innerHTML = '<main><p class="hint" style="font-size:15px">'
      + '✅ 校閲完了。ターミナルに戻ってください（SRT生成・焼き込みが続きます）。'
      + 'このタブは閉じてOKです。</p></main>';
  }
});

load();
</script>
</body>
</html>
